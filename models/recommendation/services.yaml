---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-model-stable
  namespace: ml-production
  labels:
    app: recommendation-model
    role: stable
spec:
  selector:
    app: recommendation-model
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-model-canary
  namespace: ml-production
  labels:
    app: recommendation-model
    role: canary
spec:
  selector:
    app: recommendation-model
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 8081
      targetPort: 8081
  type: ClusterIP
