apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-ml-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               ml.predictions.*
        Path              /var/log/containers/*ml-production*recommendation-model*.log
        Parser            docker
        DB                /var/log/flb_ml.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name    grep
        Match   ml.predictions.*
        Regex   log .*"event":"prediction".*

    [FILTER]
        Name                kubernetes
        Match               ml.predictions.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        Labels              On
        Annotations         Off

    [OUTPUT]
        Name   stdout
        Match  ml.predictions.*
        Format json_lines

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On
