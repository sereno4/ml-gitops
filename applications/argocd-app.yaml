apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recommendation-model
  namespace: argocd
  labels:
    team: ml-platform
    model: recommendation
spec:
  project: ml-platform

  source:
    repoURL: https://github.com/sereno4/ml-gitops
    targetRevision: main
    path: models/recommendation

  destination:
    server: https://kubernetes.default.svc
    namespace: ml-production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 1m
        factor: 2
